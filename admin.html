<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Адмін-панель замовлень | Myko Coffee</title>
  
  <!-- Шрифти -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Playfair+Display:ital,wght@0,600;0,700;1,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="styles.css">
</head>
<body class="admin-body">

  <!-- ЕКРАН ВХОДУ -->
  <div class="admin-login-overlay" id="adminLoginOverlay">
    <div class="admin-login-card">
      <div class="admin-login-logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="40" height="40">
          <ellipse cx="12" cy="12" rx="7" ry="10" />
          <path d="M12 2C10 8 14 16 12 22" />
        </svg>
      </div>
      <h2 class="admin-login-title">Myko Coffee</h2>
      <p class="admin-login-subtitle">Вхід в адмін-панель</p>
      <form id="adminLoginForm" autocomplete="off">
        <div class="admin-login-field">
          <input
            type="password"
            id="adminPasswordInput"
            class="admin-login-input"
            placeholder="Введіть пароль"
            autofocus
            required
          />
        </div>
        <p class="admin-login-error" id="adminLoginError"></p>
        <button type="submit" class="admin-login-btn">Увійти</button>
      </form>
    </div>
  </div>



  <!-- ШАПКА АДМІНКИ -->
  <header class="site-header">
    <div class="container header__inner">
      <a href="/" class="logo" aria-label="На головну — Myko Coffee">
        <svg class="logo__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="28" height="28" aria-hidden="true">
          <ellipse cx="12" cy="12" rx="7" ry="10" />
          <path d="M12 2C10 8 14 16 12 22" />
        </svg>
        <span class="logo__text">
          Myko Coffee
          <span style="font-weight: 500; font-size: 0.75em; margin-left: var(--space-2.5); border-left: 1.5px solid rgba(11, 59, 36, 0.15); padding-left: var(--space-2.5); font-family: var(--font-body); color: var(--color-text-secondary); display: inline-block; vertical-align: middle;">Адмін-панель</span>
        </span>
      </a>
      <nav class="main-nav" style="display: block;">
        <ul class="main-nav__list" style="margin: 0; padding: 0; list-style: none;">
          <li><a class="main-nav__link" href="/">На головну</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <!-- ГОЛОВНИЙ ВМІСТ -->
  <main class="admin-main">
    <div class="container">
      <header class="admin-page-header">
        <h1 class="admin-page-title">Управління замовленнями</h1>
        <div class="admin-page-controls">
          <button class="btn btn--secondary" id="refreshBtn">
            <span>Оновити</span>
          </button>
        </div>
      </header>

      <!-- ПАНЕЛЬ СТАТИСТИКИ (Дашборд бариста) -->
      <div class="admin-stats-panel">
        <div class="admin-stat-card">
          <span class="admin-stat-card__label">💰 Каса (Виконані)</span>
          <strong class="admin-stat-card__value" id="statsRevenue">0 ₴</strong>
        </div>
        <div class="admin-stat-card">
          <span class="admin-stat-card__label">☕ Виконано замовлень</span>
          <strong class="admin-stat-card__value" id="statsCount">0</strong>
        </div>
        <div class="admin-stat-card">
          <span class="admin-stat-card__label">📊 Середній чек</span>
          <strong class="admin-stat-card__value" id="statsAverage">0 ₴</strong>
        </div>
      </div>

      <!-- РЯДОК УПРАВЛІННЯ (Пошук, звук, видалення всього) -->
      <div class="admin-controls-row">
        <div class="admin-search-wrapper">
          <span class="admin-search-icon">🔍</span>
          <input type="text" id="adminSearchInput" placeholder="Пошук за іменем, телефоном чи товаром..." autocomplete="off">
        </div>
        <div class="admin-controls-actions">
          <label class="admin-sound-toggle">
            <input type="checkbox" id="adminSoundCheckbox" checked>
            <span class="admin-sound-toggle__box">
              <span class="admin-sound-toggle__icon">🔔</span>
              <span>Звуковий сигнал</span>
            </span>
          </label>
          <button class="btn btn--danger" id="deleteAllBtn" style="background-color: #dc2626; border-color: #dc2626; color: #fff;">
            <span>Видалити всі</span>
          </button>
        </div>
      </div>

      <!-- ТАБИ ФІЛЬТРІВ -->
      <div class="admin-filters">
        <button class="filter-tab filter-tab--active" data-status="all">
          <span>Всі</span>
          <span class="tab-count" id="countAll">0</span>
        </button>
        <button class="filter-tab" data-status="new">
          <span>Нові</span>
          <span class="tab-count" id="countNew">0</span>
        </button>
        <button class="filter-tab" data-status="preparing">
          <span>Готуються</span>
          <span class="tab-count" id="countPreparing">0</span>
        </button>
        <button class="filter-tab" data-status="ready">
          <span>Готові</span>
          <span class="tab-count" id="countReady">0</span>
        </button>
        <button class="filter-tab" data-status="completed">
          <span>Завершені</span>
          <span class="tab-count" id="countCompleted">0</span>
        </button>
      </div>

      <!-- СІТКА ЗАМОВЛЕНЬ -->
      <div class="orders-grid" id="ordersGrid">
        <!-- Замовлення завантажуються динамічно -->
        <div class="orders-loading">
          <div class="spinner"></div>
          <p>Завантаження замовлень...</p>
        </div>
      </div>
    </div>
  </main>

  <!-- Кастомний діалог підтвердження -->
  <div class="admin-confirm-modal" id="adminConfirmModal" aria-hidden="true">
    <div class="admin-confirm-card">
      <div class="admin-confirm-icon">⚠️</div>
      <h3 class="admin-confirm-title" id="confirmTitle">Видалити замовлення?</h3>
      <p class="admin-confirm-message" id="confirmMessage">Цю дію неможливо скасувати.</p>
      <div class="admin-confirm-buttons">
        <button class="btn btn--secondary" id="confirmCancelBtn">Скасувати</button>
        <button class="btn" id="confirmOkBtn" style="background-color: #dc2626; border-color: #dc2626; color: #fff;">Видалити</button>
      </div>
    </div>
  </div>

  <script src="admin.js"></script>
</body>
</html>
